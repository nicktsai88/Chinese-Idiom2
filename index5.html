        window.playAudio = (text, event) => {

                event.preventDefault();
            }
            if (!('speechSynthesis' in window)) {
                console.warn("此瀏覽器不支援語音合成功能");
                return;
            }
            
            // 停止目前正在播放的語音
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; // 強制設定為台灣中文
            utterance.rate = 0.9;     // 稍微放慢語速，讓發音更清楚

            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang === 'zh-TW' || v.name.includes('Taiwan') || v.name.includes('國語'));

                utterance.voice = twVoice;
            }

            window.speechSynthesis.speak(utterance);

        window.openGlobalModal = (id) => {
            try {
                const modal = document.getElementById(id);
                if(!modal) return;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    const inner = modal.firstElementChild;
                    if(inner.classList.contains('scale-95')) inner.classList.remove('scale-95');
                }, 10);
            } catch(e) { console.error(e); }
        };

        window.closeGlobalModal = (id) => {
            try {
                const modal = document.getElementById(id);
                if(!modal) return;
                modal.classList.add('opacity-0');
                const inner = modal.firstElementChild;
                if(inner && inner.classList.contains('scale-95') === false) inner.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 200);
            } catch(e) { console.error(e); }
        };

        // ==========================================
        //  進度追蹤 Modal 與 總覽功能
        // ==========================================
        window.openProgressModal = () => {
            try {
                const targetUser = viewingUser === 'ALL' ? username : viewingUser;
                if (!targetUser) return;
                const dispName = usersProfile[targetUser]?.nickname || targetUser;
                document.getElementById('progress-user-name').innerText = `📈 ${dispName} 的成語進度`;

                let html = '<div class="space-y-4">';
                let hasAnyProgress = false;

                CATEGORIES.forEach(cat => {
                    const categoryWords = Object.values(allVocab).filter(v => v.category === cat);
                    const totalWords = categoryWords.length;
                    const progressDocId = `${targetUser}_${cat}`;
                    const learnedWords = allProgress[progressDocId]?.lastIndex || 0;
                    
                    if(learnedWords > 0 || totalWords > 0) {
                        hasAnyProgress = true;
                        const bestScore = allProgress[progressDocId]?.bestScore || '-';
                        const percent = totalWords > 0 ? Math.min(100, Math.round((learnedWords / totalWords) * 100)) : 0;
                        
                        let scoreBadge = '';
                        if(bestScore !== '-') {
                            let color = 'bg-gray-100 text-gray-600';
                            if(bestScore >= 20) color = 'bg-yellow-100 text-yellow-700 border border-yellow-300';
                            else if(bestScore >= 16) color = 'bg-green-100 text-green-700 border border-green-300';
                            else if(bestScore >= 12) color = 'bg-blue-100 text-blue-700 border border-blue-300';
                            scoreBadge = `<span class="ml-2 px-2 py-0.5 rounded text-xs font-black ${color} shadow-sm" title="此分類測驗最高分">👑 最高 ${bestScore}/20</span>`;
                        }

                        html += `
                            <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-pink-100 hover:shadow-md transition-shadow relative">
                                <button onclick="openWaterfall('${cat}')" class="absolute top-4 right-4 bg-pink-50 text-pink-600 hover:bg-pink-100 border border-pink-200 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition-colors shadow-sm">
                                    👁️ 總覽成語
                                </button>
                                
                                <div class="flex items-center mb-3 pr-24">
                                    <h4 class="font-black text-lg text-rose-600 truncate">${cat}</h4>
                                    ${scoreBadge}
                                </div>
                                
                                <div class="flex justify-between items-end mb-1 pr-32">
                                    <span class="text-sm font-bold text-gray-500">${learnedWords} / ${totalWords} 字 (${percent}%)</span>
                                </div>
                                <div class="w-full bg-pink-50 rounded-full h-4 overflow-hidden border border-pink-100">
                                    <div class="bg-gradient-to-r from-pink-400 to-rose-400 h-4 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        `;
                    }
                });

                if(!hasAnyProgress) html = `<div class="text-center text-gray-500 font-bold py-10">尚無學習進度，趕快去日曆挑選分類開始學習吧！</div>`;
                else html += '</div>';

                document.getElementById('progress-content').innerHTML = html;
                openGlobalModal('progress-modal');
            } catch(e) { console.error("openProgressModal error", e); }
        };

        window.openWaterfall = (category) => {
            try {
                const categoryWords = Object.values(allVocab).filter(v => v.category === category).sort((a,b) => a.index - b.index);
                document.getElementById('waterfall-title').innerText = `👁️ ${category} 總覽 (${categoryWords.length} 字)`;
                
                if(categoryWords.length === 0) {
                    document.getElementById('waterfall-content').innerHTML = `<div class="text-center text-gray-400 font-bold mt-10">此分類尚無成語資料</div>`;
                    openGlobalModal('waterfall-modal');
                    return;
                }

                let html = '<div class="columns-1 md:columns-2 lg:columns-3 gap-4 space-y-4">';
                categoryWords.forEach(w => {
                    const favId = `${username}_${w.id}`;
                    const isFav = !!allFavorites[favId];
                    const safeWord = escapeQuotes(w.word);
                    
                    let emotionColor = 'text-gray-500 bg-gray-100';
                    if (w.emotion === '褒義') emotionColor = 'text-rose-600 bg-rose-50 border border-rose-200';
                    if (w.emotion === '貶義') emotionColor = 'text-teal-700 bg-teal-50 border border-teal-200';
                    if (w.emotion === '中性') emotionColor = 'text-blue-600 bg-blue-50 border border-blue-200';

                    html += `

                                    <button onclick="playAudio('${safeWord}', event)" class="bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-full w-7 h-7 flex items-center justify-center shadow-sm transition-colors text-xs" title="聆聽發音">🔊</button>
                                </div>
                            </div>
                            <div class="text-base font-bold text-gray-700 mb-3 mt-3 leading-relaxed border-l-2 border-pink-300 pl-3">${w.meaning}</div>
                            ${w.sentence ? `
                                <div class="bg-gray-50 p-3 rounded-lg text-sm border border-gray-200 mt-2">
                                    <div class="text-gray-600 font-medium leading-relaxed"><span class="text-rose-400 font-bold mr-1">✏️</span>${w.sentence}</div>
                                </div>
                            ` : ''}
                            <div class="absolute bottom-2 right-3 text-xs text-gray-300 font-mono hidden group-hover:block">#${w.index}</div>
                        </div>
                    `;
                });
                html += '</div>';

                document.getElementById('waterfall-content').innerHTML = html;
                openGlobalModal('waterfall-modal');
            } catch(e) { console.error("openWaterfall error", e); }
        };

        // ==========================================
        //  通用動作邏輯
        // ==========================================
        window.saveFirebaseConfig = () => {
            const apiKey = document.getElementById('cfg-apiKey').value.trim();
            if (!apiKey) return alert("API Key 為必填欄位！");
            localStorage.setItem('study_group_firebase_config', JSON.stringify({ apiKey }));
            alert("設定已儲存！系統將重新啟動。");
            window.location.reload(); 
        };

        window.logout = () => {
            username = ''; viewingUser = 'ALL'; isAdmin = false;
            localStorage.removeItem('study_group_user');
            
            if(unsubDates) unsubDates();
            if(unsubChat) unsubChat();
            if(unsubUsers) unsubUsers();
            if(unsubProfile) unsubProfile();
            if(unsubVocab) unsubVocab();
            if(unsubProgress) unsubProgress();
            if(unsubActivity) unsubActivity();
            if(unsubFav) unsubFav();
            if(unsubWeak) unsubWeak();
            
            chatMessages = []; importantDates = [];
            allVocab = {}; allProgress = {}; allActivities = {}; allFavorites = {}; allWeakness = {};
            
            setupLoginListener();
            window.renderLogin();
        };

        window.sendChat = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;

        window.handleProfilePhoto = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('prof-photo-upload').dataset.base64 = base64;
                    document.getElementById('prof-photo-preview').src = base64;
                    document.getElementById('prof-photo-preview').classList.remove('hidden');
                    document.getElementById('prof-photo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);

        window.openEbbinghausStage = (category, startIndex, endIndex) => {

        window.completeEbbinghausStage = async (category, startIndex) => {

                reviewCount: stageData.reviewCount + 1,
                lastReviewDate: formatDate(new Date())
            };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                    stages: stages,
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                
                alert(`🎉 恭喜完成複習！本關卡已複習 ${stageData.reviewCount + 1} 次。`);

                console.error(e);

        // ==========================================
        //  全新學習流程：選擇分類 (Accordion) 與 學習列表
        // ==========================================
        window.openLevelModal = (dateStr) => {

        window.startLearning = (category) => {
            try {
                const progressDocId = `${username}_${category}`;
                const currentIndex = allProgress[progressDocId]?.lastIndex || 0;
                
                const categoryWords = Object.values(allVocab).filter(v => v.category === category).sort((a,b) => a.index - b.index);

                currentPageIndex = 0;
                isReviewMode = false;

                document.getElementById('learning-modal-title-badge').innerText = `範圍: ${currentIndex + 1} ~ ${currentIndex + currentLearningBatch.length}`;
                
                closeGlobalModal('level-select-modal');
                renderLearningPage();
                openGlobalModal('learning-modal');
            } catch(e) { console.error("startLearning error", e); }
        };

        window.renderLearningPage = () => {
            try {
                const start = currentPageIndex * 10;
                const end = start + 10;
                const pageWords = currentLearningBatch.slice(start, end);
                
                let html = '<div class="space-y-4 w-full px-1">';
                
                pageWords.forEach((wordObj, i) => {
                    const favId = `${username}_${wordObj.id}`;
                    const isFav = !!allFavorites[favId];

                    let emotionColor = 'text-gray-500 bg-gray-100 border-gray-200';
                    if (wordObj.emotion === '褒義') emotionColor = 'text-rose-600 bg-rose-50 border-rose-200';
                    if (wordObj.emotion === '貶義') emotionColor = 'text-teal-700 bg-teal-50 border-teal-200';
                    if (wordObj.emotion === '中性') emotionColor = 'text-blue-600 bg-blue-50 border-blue-200';
                    
                    html += `
                        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border-2 border-pink-100 relative hover:shadow-md hover:border-pink-300 transition-all">
                            <div class="absolute top-4 left-4 text-xs font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded border border-gray-100"># ${wordObj.index}</div>
                            <button onclick="toggleFavorite('${wordObj.id}', event)" class="absolute top-4 right-4 text-2xl hover:scale-125 transition-transform" title="加入我的最愛">
                                ${isFav ? '❤️' : '🤍'}
                            </button>
                            
                            <div class="mt-8 mb-4 text-center md:text-left flex flex-col items-center md:items-start">
                                <div class="text-sm md:text-base font-bold text-pink-500 tracking-[0.2em] mb-1 font-mono">${wordObj.pinyin || '無注音資料'}</div>
                                <div class="flex items-center gap-3 justify-center md:justify-start flex-wrap">
                                    <h3 class="text-4xl md:text-5xl font-black text-gray-800 tracking-widest">${wordObj.word}</h3>
                                    <span class="text-sm px-2 py-1 rounded shadow-sm border ${emotionColor} ml-2">${wordObj.emotion || '無'}</span>
                                </div>
                                <div class="text-pink-700 font-bold mt-4 text-lg md:text-xl border-l-4 border-pink-500 pl-3 leading-relaxed">
                                    ${wordObj.meaning}
                                </div>
                            </div>
                            
                            ${wordObj.sentence ? `
                                <div class="bg-pink-50/50 rounded-xl p-4 mt-4 border border-pink-100">
                                    <div class="text-gray-700 font-medium text-base md:text-lg leading-relaxed">
                                        <span class="text-pink-400 font-bold mr-2">✏️ 例句：</span>${wordObj.sentence}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('learning-content').innerHTML = html;
                
                const totalPages = Math.ceil(currentLearningBatch.length / 10);
                document.getElementById('learning-page-indicator').innerText = `頁次 ${currentPageIndex + 1} / ${totalPages}`;
                
                const btnPrev = document.getElementById('btn-prev-page');
                const btnNext = document.getElementById('btn-next-page');
                
                if(currentPageIndex > 0) btnPrev.classList.remove('invisible');
                else btnPrev.classList.add('invisible');
                
                if(currentPageIndex >= totalPages - 1) {
                    btnNext.innerText = '完成學習，進入測驗 ⚔️';
                    btnNext.classList.replace('bg-pink-500', 'bg-orange-500');
                    btnNext.classList.replace('hover:bg-pink-600', 'hover:bg-orange-600');
                } else {
                    btnNext.innerText = '下一頁 ▶';
                    btnNext.classList.replace('bg-orange-500', 'bg-pink-500');
                    btnNext.classList.replace('hover:bg-orange-600', 'hover:bg-pink-600');
                }
                
                document.getElementById('learning-content').scrollTop = 0;
            } catch(e) { console.error("renderLearningPage error", e); }
        };

        window.prevPage = () => {
            if(currentPageIndex > 0) {
                currentPageIndex--;
                renderLearningPage();
            }
        };

        window.nextPage = async () => {
            const totalPages = Math.ceil(currentLearningBatch.length / 10);
            
            if(currentPageIndex >= totalPages - 1) {
                alert("進入隨機測驗！必須完成該單元測驗，系統才會記錄您的學習進度喔！");
                startQuiz('post_learning', modalState.category);
            } else {
                currentPageIndex++;
                renderLearningPage();
            }
        };

        // ==========================================
        //  情境填空測驗 (Quiz Mode) 邏輯
        // ==========================================
        window.startQuiz = (mode, category) => {
            try {
                let pool = [];
                if (mode === 'post_learning') {
                    pool = [...currentLearningBatch];
                } else if (mode === 'category') {
                    const progressDocId = `${username}_${category}`;
                    const learnedCount = allProgress[progressDocId]?.lastIndex || 0;
                    const categoryWords = Object.values(allVocab).filter(v => v.category === category).sort((a,b) => a.index - b.index);
                    pool = categoryWords.slice(0, learnedCount);
                    if (pool.length < 4) {
                        alert("此分類已學習的成語數量不足，無法進行測驗！（至少需要 4 個成語）");
                        return;
                    }
                    pool = pool.sort(() => 0.5 - Math.random()).slice(0, 20); // 最多測 20 題
                }

                quizState = {
                    category: category,
                    mode: mode,
                    questions: pool.sort(() => 0.5 - Math.random()), 
                    currentIndex: 0,
                    correct: 0,
                    wrongWords: []
                };

                closeGlobalModal('learning-modal');
                closeGlobalModal('level-select-modal');
                
                renderQuizQuestion();
                openGlobalModal('quiz-modal');
            } catch(e) { console.error("startQuiz error", e); }
        };

        window.renderQuizQuestion = () => {
            try {
                const total = quizState.questions.length;
                const current = quizState.currentIndex;
                
                const pct = (current / total) * 100;
                document.getElementById('quiz-progress-bar').style.width = `${pct}%`;
                document.getElementById('quiz-progress-badge').innerText = `第 ${current + 1} / ${total} 題`;

                const wordObj = quizState.questions[current];
                const correctWordStr = wordObj.word;
                const safeCorrectWord = escapeQuotes(correctWordStr);

                // 尋找干擾選項：為了避免選項性質太相近，我們尋找與正確答案屬於「不同第一階大分類」的成語
                const getTier1 = (cat) => {
                    for (const t1 of IDIOM_HIERARCHY) {
                        for (const t2 of t1.t2) {
                            for (const t3 of t2.t3) {
                                if (t3.cats.includes(cat)) return t1.t1;
                            }
                        }
                    }
                    return null;
                };

                const correctTier1 = getTier1(wordObj.category);
                let distractors = [];
                let usedTier1s = new Set();
                if (correctTier1) usedTier1s.add(correctTier1);

                // 將其他成語隨機打亂
                let shuffledVocab = Object.values(allVocab)
                    .filter(v => v.word !== correctWordStr)
                    .sort(() => 0.5 - Math.random());

                // 優先挑選：大分類不同，且干擾選項彼此之間的大分類也盡量不重複
                for (let v of shuffledVocab) {
                    if (distractors.length >= 3) break;
                    let vTier1 = getTier1(v.category);
                    if (vTier1 && !usedTier1s.has(vTier1)) {
                        distractors.push(v);
                        usedTier1s.add(vTier1);
                    }
                }

                // 如果您的題庫數量剛建立還太少，導致跨大分類挑不滿 3 個，就放寬標準（只要成語不同即可）
                if (distractors.length < 3) {
                    for (let v of shuffledVocab) {
                        if (distractors.length >= 3) break;
                        if (!distractors.find(d => d.word === v.word)) {
                            distractors.push(v);
                        }
                    }
                }

                const options = [wordObj, ...distractors].sort(() => 0.5 - Math.random());

                let questionHtml = '';
                if (wordObj.sentence) {
                    // 將例句中的目標成語替換為底線
                    const regex = new RegExp(correctWordStr, 'gi');
                    const blankedSentence = wordObj.sentence.replace(regex, '________');
                    
                    questionHtml = `
                        <div class="text-sm font-bold text-rose-500 mb-2">請選出適合填入空格的成語：</div>
                        <div id="quiz-sentence-display" class="text-2xl md:text-4xl font-black text-gray-800 leading-relaxed mb-6 px-4 tracking-wide border-l-4 border-rose-400 pl-4 py-2 bg-white shadow-sm rounded-r-xl">${blankedSentence}</div>
                        
                        <div id="quiz-explanation" class="hidden mt-6 bg-pink-50 p-6 rounded-2xl border border-pink-200 text-left mx-auto w-full shadow-inner">
                            <div class="text-xl md:text-2xl font-black text-rose-600 mb-3 leading-relaxed">完整例句：<br>${wordObj.sentence}</div>
                            <div class="text-md md:text-lg text-gray-700 font-bold border-t border-pink-200 pt-3">釋義：${wordObj.meaning}</div>
                        </div>
                    `;
                } else {
                    // 若無例句，則用釋義來反推成語
                    questionHtml = `
                        <div class="text-sm font-bold text-rose-500 mb-2">請選出符合以下釋義的成語：</div>
                        <div class="text-2xl md:text-4xl font-black text-gray-800 leading-relaxed mb-6 px-4 py-4 bg-white shadow-sm rounded-xl border border-gray-100">${wordObj.meaning}</div>
                        
                        <div id="quiz-explanation" class="hidden mt-6 bg-pink-50 p-6 rounded-2xl border border-pink-200 w-full shadow-inner text-center">
                            <div class="text-3xl md:text-5xl font-black text-rose-600 tracking-widest">${wordObj.word}</div>
                        </div>
                    `;
                }

                const optionsHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 w-full max-w-3xl mx-auto">
                        ${options.map(opt => `
                            <button onclick="checkQuizAnswer(this, '${escapeQuotes(opt.word)}', '${safeCorrectWord}')" data-word="${escapeQuotes(opt.word)}" class="quiz-option-btn py-5 px-6 rounded-2xl bg-white border-2 border-rose-200 text-gray-700 font-black text-2xl md:text-3xl tracking-widest shadow-sm hover:bg-rose-50 hover:border-rose-400 hover:scale-[1.02] transition-all">
                                ${opt.word}
                            </button>
                        `).join('')}
                    </div>
                `;

                const nextBtnHtml = `
                    <div id="quiz-next-btn-container" class="hidden mt-10">
                        <button onclick="nextQuizQuestion()" class="px-10 py-4 bg-rose-500 text-white font-black rounded-xl hover:bg-rose-600 shadow-md text-xl animate-bounce">下一題 ▶</button>
                    </div>
                `;

                document.getElementById('quiz-question-container').innerHTML = questionHtml + optionsHtml + nextBtnHtml;
            } catch(e) { console.error("renderQuizQuestion error", e); }
        };

        window.checkQuizAnswer = async (btn, selectedWord, correctWord) => {
            try {
                const btns = document.querySelectorAll('.quiz-option-btn');
                btns.forEach(b => {
                    b.disabled = true;
                    b.classList.remove('hover:bg-rose-50', 'hover:border-rose-400', 'hover:scale-[1.02]');
                });

                const isCorrect = (selectedWord === correctWord);
                const currentObj = quizState.questions[quizState.currentIndex];

                if (isCorrect) {
                    btn.classList.replace('bg-white', 'bg-green-400');
                    btn.classList.replace('border-rose-200', 'border-green-500');
                    btn.classList.replace('text-gray-700', 'text-white');
                    quizState.correct++;
                } else {
                    btn.classList.replace('bg-white', 'bg-red-500');
                    btn.classList.replace('border-rose-200', 'border-red-600');
                    btn.classList.replace('text-gray-700', 'text-white');
                    btn.classList.add('shake');
                    
                    const correctBtn = Array.from(btns).find(b => b.dataset.word === correctWord);
                    if (correctBtn) {
                        correctBtn.classList.replace('bg-white', 'bg-green-400');
                        correctBtn.classList.replace('border-rose-200', 'border-green-500');
                        correctBtn.classList.replace('text-gray-700', 'text-white');
                    }

                    if (!quizState.wrongWords.find(w => w.id === currentObj.id)) {
                        quizState.wrongWords.push(currentObj);
                    }
                }

                const exp = document.getElementById('quiz-explanation');
                if (exp) exp.classList.remove('hidden');
                
                const senDisp = document.getElementById('quiz-sentence-display');
                if (senDisp && currentObj.sentence) senDisp.classList.add('hidden');
                
                document.getElementById('quiz-next-btn-container').classList.remove('hidden');

            } catch(e) { console.error("checkQuizAnswer error", e); }
        };

        window.nextQuizQuestion = () => {
            quizState.currentIndex++;
            if (quizState.currentIndex >= quizState.questions.length) {
                finishQuiz();
            } else {
                renderQuizQuestion();
            }
        };

        window.finishQuiz = async () => {
            const total = quizState.questions.length;
            const correct = quizState.correct;
            const score = correct; 

            if (quizState.mode === 'post_learning') {
                const progressDocId = `${username}_${quizState.category}`;
                const currentIndex = allProgress[progressDocId]?.lastIndex || 0;
                
                if (!isReviewMode) {
                    const newIndex = currentIndex + currentLearningBatch.length;
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                            user: username,
                            category: quizState.category,
                            lastIndex: newIndex,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                    } catch(e) { console.error(e); }
                }
                
                const activityId = `${username}_${modalState.date}_${Date.now()}`;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabActivity', activityId), {
                        user: username,
                        date: modalState.date,
                        category: quizState.category,
                        wordsLearned: currentLearningBatch.length,
                        timestamp: new Date().toISOString()
                    });
                } catch(e) { console.error(e); }
            }

            if (quizState.wrongWords.length > 0) {
                try {
                    for(let w of quizState.wrongWords) {
                        const weakId = `${username}_${w.id}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness', weakId), {
                            user: username,
                            wordId: w.id,
                            wordObj: w,
                            addedAt: new Date().toISOString()
                        }, { merge: true });
                    }
                } catch(e) { console.error("Error saving weaknesses", e); }
            }

            let grade = 'C 級';
            let icon = '🎯';
            let msg = '再接再厲！錯題已經幫您整理到集中營囉。';
            
            if (score >= total) {
                grade = 'S 級'; icon = '👑'; msg = '太神啦！完美無瑕！成語大師就是您。';
            } else if (score >= total - 3) {
                grade = 'A 級'; icon = '🥇'; msg = '非常優秀！只差一點點就完美了。';
            } else if (score >= total * 0.6) {
                grade = 'B 級'; icon = '🥈'; msg = '表現不錯！請去錯題集中營複習一下喔。';
            }

            if (quizState.mode === 'category' || quizState.mode === 'post_learning') {
                const progressDocId = `${username}_${quizState.category}`;
                const currentBest = allProgress[progressDocId]?.bestScore || 0;
                if (score > currentBest) {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'VocabProgress', progressDocId), {
                            bestScore: score,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                        msg += '<br><span class="text-rose-500 font-bold mt-2 inline-block">🚀 最高紀錄已更新！</span>';
                    } catch(e) {}
                }
            }

            try {
                document.getElementById('quiz-result-icon').innerText = icon;
                document.getElementById('quiz-result-grade').innerText = grade;
                document.getElementById('quiz-result-score').innerText = `答對 ${correct} / ${total} 題`;
                document.getElementById('quiz-result-msg').innerHTML = msg;
            } catch(e) {}

            closeGlobalModal('quiz-modal');
            openGlobalModal('quiz-result-modal');
        };

        // ==========================================
        //  錯題集中營 (Weakness Camp) 與 成績總覽 邏輯
        // ==========================================
        window.openWeaknessCamp = () => {
            try {
                const container = document.getElementById('weakness-content');
                const myWeaknesses = Object.values(allWeakness).filter(w => w.user === username);
                
                if(myWeaknesses.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-gray-500">
                            <div class="text-6xl mb-6 drop-shadow-md">🎉</div>
                            <h3 class="text-2xl font-black text-rose-500 drop-shadow-sm">太棒了！目前沒有錯題！</h3>
                            <p class="text-md mt-2 font-bold text-gray-400">繼續保持這個氣勢，多做測驗吧 🚀</p>
                        </div>
                    `;
                } else {
                    const weakByCategory = {};
                    CATEGORIES.forEach(c => weakByCategory[c] = []);
                    myWeaknesses.forEach(w => {
                        if (weakByCategory[w.wordObj.category]) weakByCategory[w.wordObj.category].push(w);
                    });

                    let html = '<div class="space-y-8">';
                    CATEGORIES.forEach(cat => {
                        const weakWords = weakByCategory[cat];
                        if (weakWords && weakWords.length > 0) {
                            html += `
                                <div>
                                    <h3 class="text-xl font-black text-red-600 mb-4 border-b-2 border-red-200 pb-2 pl-2 border-l-4 border-l-red-500">${cat} <span class="text-sm font-bold text-gray-400 ml-2">共 ${weakWords.length} 題</span></h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            `;
                            
                            weakWords.forEach(weak => {
                                const w = weak.wordObj;
                                const safeWord = escapeQuotes(w.word);

                                html += `
                                    <div class="rounded-2xl p-5 shadow-sm border-2 border-red-200 bg-red-50/50 relative flex flex-col hover:shadow-md transition-shadow group">
                                        <div class="flex items-center gap-3 mt-1 mb-3">
                                            <h4 class="font-black text-gray-800 text-2xl md:text-3xl tracking-widest leading-tight">${w.word}</h4>
                                        </div>
                                        
                                        <div class="text-red-700 font-bold mb-3 border-l-2 border-red-400 pl-2">
                                            ${w.meaning}
                                        </div>
                                        
                                        ${w.sentence ? `
                                            <div class="bg-white p-3 rounded-xl border border-red-100 mb-2 text-sm flex gap-2">
                                                <div>
                                                    <div class="text-gray-700 font-medium mb-1"><span class="text-red-400 font-bold text-xs mr-1">✏️</span>${w.sentence}</div>
                                                </div>
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            });
                            
                            html += `</div></div>`;
                        }
                    });
                    html += '</div>';
                    container.innerHTML = html;
                }
                
                closeGlobalModal('quiz-result-modal'); 
                openGlobalModal('weakness-modal');
            } catch(e) { console.error("openWeaknessCamp error", e); }
        };

        window.openScoreBoard = () => {
            try {
                const header = document.getElementById('score-board-header');
                const tbody = document.getElementById('score-board-body');
                if(!header || !tbody) return;
                
                // 預先計算每個 分類 的總字數
                const totalWordsByCat = {};
                CATEGORIES.forEach(cat => {
                    totalWordsByCat[cat] = Object.values(allVocab).filter(v => v.category === cat).length;
                });
                
                let headerHtml = `
                    <th class="p-3 bg-indigo-100 sticky left-0 z-10 w-12 border-r border-indigo-200">名次</th>
                    <th class="p-3 bg-indigo-100 sticky left-12 z-10 border-r border-indigo-200">學習者</th>
                    <th class="p-3 bg-indigo-200 text-indigo-900 border-r border-indigo-300">總學習字數</th>
                `;
                // 因為 157 類太多，排行榜只顯示大分類 (Tier 1) 的加總進度
                IDIOM_HIERARCHY.forEach(t1 => headerHtml += `<th class="p-3 whitespace-nowrap">${t1.t1}</th>`);
                header.innerHTML = headerHtml;

                // 計算每位使用者的總字數與各級進度
                const userStats = globalUsers.map(u => {
                    let totalLearned = 0;
                    const tier1Progress = {};
                    
                    IDIOM_HIERARCHY.forEach(t1 => {
                        let t1Learned = 0;
                        t1.t2.forEach(t2 => t2.t3.forEach(t3 => t3.cats.forEach(cat => {
                            const progressDocId = `${u}_${cat}`;
                            const learned = allProgress[progressDocId]?.lastIndex || 0;
                            t1Learned += learned;
                            totalLearned += learned;
                        })));
                        tier1Progress[t1.t1] = t1Learned;
                    });
                    
                    return {
                        id: u,
                        dispName: usersProfile[u]?.nickname || u,
                        totalLearned: totalLearned,
                        tier1Progress: tier1Progress
                    };
                });
                
                // 依照總字數由高到低排序
                userStats.sort((a, b) => b.totalLearned - a.totalLearned);

                let bodyHtml = '';
                userStats.forEach((stat, index) => {
                    const rank = index + 1;
                    let rankBadge = `<span class="text-gray-500 font-bold">${rank}</span>`;
                    if(rank === 1) rankBadge = `<span class="text-2xl" title="第一名">🥇</span>`;
                    else if(rank === 2) rankBadge = `<span class="text-2xl" title="第二名">🥈</span>`;
                    else if(rank === 3) rankBadge = `<span class="text-2xl" title="第三名">🥉</span>`;

                    const isMe = stat.id === username;
                    const rowClass = isMe ? 'bg-indigo-50/50 hover:bg-indigo-100/50' : 'hover:bg-indigo-50';
                    const stickyBg = isMe ? 'bg-indigo-50' : 'bg-white';

                    bodyHtml += `<tr class="${rowClass} transition-colors">`;
                    bodyHtml += `<td class="p-3 border-r border-gray-100 ${stickyBg} sticky left-0 z-10">${rankBadge}</td>`;
                    bodyHtml += `<td class="p-3 font-black text-gray-800 border-r border-gray-100 ${stickyBg} sticky left-12 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
                                    <div class="flex items-center gap-2 justify-center md:justify-start">
                                        <div class="${getUserColor(stat.id)} w-6 h-6 rounded-full flex items-center justify-center text-[10px] shadow-sm shrink-0">${getAvatarChar(stat.id)}</div>
                                        <span class="truncate max-w-[100px] md:max-w-none" title="${stat.dispName}">${stat.dispName}</span>
                                        ${isMe ? '<span class="text-[10px] bg-indigo-500 text-white px-1.5 py-0.5 rounded shadow-sm ml-1 shrink-0">我</span>' : ''}
                                    </div>
                                 </td>`;
                    
                    bodyHtml += `<td class="p-3 font-black text-xl text-indigo-600 bg-indigo-50/30 border-r border-gray-100">${stat.totalLearned} <span class="text-xs text-indigo-400">字</span></td>`;
                    
                    IDIOM_HIERARCHY.forEach(t1 => {
                        const learned = stat.tier1Progress[t1.t1];
                        // 計算這個大分類的總字數
                        let t1Total = 0;
                        t1.t2.forEach(t2 => t2.t3.forEach(t3 => t3.cats.forEach(c => t1Total += totalWordsByCat[c] || 0)));

                        if (learned > 0) {
                            const isComplete = learned >= t1Total && t1Total > 0;
                            const colorClass = isComplete ? 'text-green-600 font-black' : 'text-gray-600 font-bold';
                            const icon = isComplete ? ' ✅' : '';
                            bodyHtml += `<td class="p-3 ${colorClass}">${learned} / ${t1Total} 字${icon}</td>`;
                        } else {
                            bodyHtml += `<td class="p-3 text-gray-300">-</td>`;
                        }
                    });
                    bodyHtml += `</tr>`;
                });
                tbody.innerHTML = bodyHtml;

                openGlobalModal('score-board-modal');
            } catch(e) { console.error("openScoreBoard error", e); }
        };

        // ==========================================
        //  Firebase 監聽與初始化
        // ==========================================
        const setupLoginListener = () => {
            if (!currentUser) return;
            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if(!username && window.renderLogin) window.renderLogin();
            }, (err) => console.warn("登入監聽失敗:", err));
            
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(!username && window.renderLogin) window.renderLogin();
            });
        };

        const setupListeners = () => {
            if (!currentUser) return;
            const errHandler = (err) => console.warn("Firestore Listener Error:", err);

            const usersRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersList');
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(usersRef, (snap) => {
                if(snap.exists()) {
                    globalUsers = snap.data().users || [];
                } else {
                    globalUsers = [];
                }
                if (username && !globalUsers.includes(username)) {
                    alert('⚠️ 系統提示：您的帳號已被管理員移除或系統重置，請重新註冊/登入！');
                    window.logout(); 
                }
            }, errHandler);

            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'UsersProfile');
            if(unsubProfile) unsubProfile();
            unsubProfile = onSnapshot(profileRef, (snap) => {
                if(snap.exists()) {
                    usersProfile = snap.data().profiles || {};
                } else {
                    usersProfile = {};
                }
                if(username) {
                    try { window.renderMainContent(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            const datesRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Dates');
            if(unsubDates) unsubDates();
            unsubDates = onSnapshot(datesRef, (snap) => {
                if(snap.exists()) {
                    importantDates = snap.data().list || [];
                } else {
                    importantDates = [
                        { date: '2027-05-22', title: '大會考決戰日' },
                        { date: '2026-10-13', title: '階段性測驗' }
                    ];
                    setDoc(datesRef, { list: importantDates }).catch(errHandler);
                }
                if(username) {
                    try { window.renderSidebar(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'System', 'Chat');
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(chatRef, (snap) => {
                if(snap.exists()) chatMessages = snap.data().messages || [];
                if(username) {
                    try { window.renderChat(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 題庫資料監聽
            const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
            if(unsubVocab) unsubVocab();
            unsubVocab = onSnapshot(vocabCol, (snap) => {
                allVocab = {};
                snap.forEach(docSnap => allVocab[docSnap.id] = docSnap.data());
                if(username) {
                    try {
                        const progressModal = document.getElementById('progress-modal');
                        if(progressModal && !progressModal.classList.contains('hidden')) window.openProgressModal();
                        window.renderMainContent(); 
                    } catch(e) {}
                }
            }, errHandler);

            // 學習進度監聽
            const progressCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabProgress');
            if(unsubProgress) unsubProgress();
            unsubProgress = onSnapshot(progressCol, (snap) => {
                allProgress = {};
                snap.forEach(docSnap => allProgress[docSnap.id] = docSnap.data());
                if(username && document.getElementById('progress-modal') && !document.getElementById('progress-modal').classList.contains('hidden')) {
                    try { window.openProgressModal(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 活動紀錄監聽 (日曆顯示用)
            const activityCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabActivity');
            if(unsubActivity) unsubActivity();
            unsubActivity = onSnapshot(activityCol, (snap) => {
                allActivities = {};
                snap.forEach(docSnap => allActivities[docSnap.id] = docSnap.data());
                if(username) {
                    try { window.renderMainContent(); } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 最愛成語監聽
            const favCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabFavorites');
            if(unsubFav) unsubFav();
            unsubFav = onSnapshot(favCol, (snap) => {
                allFavorites = {};
                snap.forEach(docSnap => allFavorites[docSnap.id] = docSnap.data());
                if(username) {
                    try {
                        window.renderFavorites();
                        const learningModal = document.getElementById('learning-modal');
                        if(learningModal && !learningModal.classList.contains('hidden')) window.renderLearningPage();
                        const waterfallModal = document.getElementById('waterfall-modal');
                        if(waterfallModal && !waterfallModal.classList.contains('hidden')) {
                             const titleText = document.getElementById('waterfall-title').innerText;
                             // Extract category name properly if needed, here just re-rendering might be safer if we kept track of current category
                        }
                    } catch(e) { console.error(e); }
                }
            }, errHandler);

            // 錯題集中營監聽
            const weakCol = collection(db, 'artifacts', appId, 'public', 'data', 'VocabWeakness');
            if(unsubWeak) unsubWeak();
            unsubWeak = onSnapshot(weakCol, (snap) => {
                allWeakness = {};
                snap.forEach(docSnap => allWeakness[docSnap.id] = docSnap.data());
                if(username && document.getElementById('weakness-modal') && !document.getElementById('weakness-modal').classList.contains('hidden')) {
                    try { window.openWeaknessCamp(); } catch(e) { console.error(e); }
                }
            }, errHandler);
        };

        const initApp = async () => {
            try {
                window.renderApp();
            } catch (e) { console.error("renderApp error", e); }
            
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                window.renderSetup();
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                if (!appInstance) {
                    appInstance = initializeApp(fullConfig);
                    auth = getAuth(appInstance);
                    db = getFirestore(appInstance);
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        const savedUser = localStorage.getItem('study_group_user');
                        if (savedUser) {
                            doCompleteLogin(savedUser); 
                        } else {
                            setupLoginListener();
                            window.renderLogin();
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase 連線失敗:", error);
                alert("Firebase 連線失敗，請檢查系統設定參數是否正確！");
                window.renderSetup();
            }
        };

        setTimeout(initApp, 100);

    </script>
</body>
</html>
