            <div id="status-badge" class="bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-inner">未連線</div>
        </div>

                <!-- Single Word Insert -->
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="font-bold text-lg text-gray-700 mb-4 border-l-4 border-indigo-500 pl-2">新增單筆成語</h2>
                    <div class="space-y-3 text-sm">
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">目標分類 (如: 01. [早春與初春]) *</label>
                            <select id="f-category" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400 font-bold text-indigo-700">
                                <!-- JS 會動態注入這 157 個選項 -->
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">成語 *</label>

                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">注音 *</label>
                            <input type="text" id="f-pinyin" placeholder="例如: ㄙˋ ㄐㄧˋ ㄖㄨˊ ㄔㄨㄣ" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">情感色彩 *</label>
                            <select id="f-emotion" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                                <option value="褒義">褒義 (正面)</option>
                                <option value="中性" selected>中性 (客觀)</option>
                                <option value="貶義">貶義 (負面)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">成語釋義 (建議 20 字內) *</label>
                            <input type="text" id="f-meaning" placeholder="例如: 形容氣候溫和..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-600 mb-1">成語例句 (建議 25 字內)</label>
                            <input type="text" id="f-sentence" placeholder="昆明氣候溫和，四季如春。" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-indigo-400">

                <!-- Bulk Import -->
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">

                    <div class="space-y-3 text-sm">

                            <label class="block font-bold text-gray-600 mb-1">目標分類 *</label>

                                <!-- JS 會動態注入選項 -->
                            </select>
                        </div>

                            <textarea id="b-json" rows="8" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-amber-400 text-xs font-mono" placeholder='[
  {
    "word": "四季如春",
    "pinyin": "ㄙˋ ㄐㄧˋ ㄖㄨˊ ㄔㄨㄣ",
    "emotion": "褒義",
    "meaning": "形容氣候溫和...",
    "sentence": "..."
  }
]'></textarea>
                        </div>

                </div>

                    <div class="space-y-3 text-sm">

                            <label class="block font-bold text-gray-600 mb-1">目標分類 *</label>
                            <select id="delete-category" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-red-400 font-bold text-red-700">
                                <option value="ALL">全部等級 (危險！清空題庫)</option>
                                <!-- JS 會動態注入選項 -->
                            </select>
                        </div>
                        <button onclick="bulkDelete()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 rounded-lg transition-colors mt-2 shadow-sm flex items-center justify-center gap-2">
                            <span>🗑️ 執行批次刪除</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Data Table -->
            <div class="w-2/3 p-6 flex flex-col bg-white">

                <div class="flex-1 overflow-auto border border-gray-200 rounded-xl">

                <div class="text-sm font-bold text-gray-400 text-right mt-3 shrink-0" id="total-count">總計: 0 筆</div>

        </div>
    </div>

    <script type="module">

        let allVocab = [];

            "137. [祝賀生子(分男女)]", "138. [男壽專用]", "139. [女壽專用]", "140. [通用與雙壽]", 
            "141. [男喪專用]", "142. [女喪專用]", "143. [師長與通用]", "144. [自稱己身(人稱)]", 
            "145. [謙稱己物/己見]", "146. [尊稱他人(人稱)]", "147. [尊稱他物/他見]", "148. [長輩專用]", 
            "149. [平輩與晚輩專用]", "150. [春節與元旦]", "151. [元宵與清明]", "152. [端午節專用]", 
            "153. [七夕專用]", "154. [中元節專用]", "155. [中秋節專用]", "156. [重陽節專用]", 
            "157. [冬至與除夕]"
        ];

        // 初始化所有分類選單
        const initCategorySelects = () => {
            const optionsHtml = IDIOM_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('f-category').innerHTML = optionsHtml;
            document.getElementById('b-category').innerHTML = optionsHtml;
            document.getElementById('filter-category').innerHTML = `<option value="ALL">顯示全部 (ALL)</option>` + optionsHtml;
            document.getElementById('delete-category').innerHTML = `<option value="ALL">全部等級 (危險！清空題庫)</option>` + optionsHtml;
        };

        const getStoredConfig = () => {
            const stored = localStorage.getItem('study_group_firebase_config');
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            if (typeof __firebase_config !== 'undefined') { try { return JSON.parse(__firebase_config); } catch(e) {} }
            return null;
        };

        const updateStatus = (msg, isConnected, colorClass = null) => {
            const badge = document.getElementById('status-badge');
            badge.innerText = msg;
            badge.className = `px-3 py-1 rounded-full text-sm font-bold shadow-inner text-white ${colorClass ? colorClass : (isConnected ? 'bg-green-500' : 'bg-red-500')}`;
        };

        window.renderTable = () => {
            const tbody = document.getElementById('vocab-table-body');
            const filterCat = document.getElementById('filter-category').value;
            
            let filtered = filterCat === 'ALL' ? allVocab : allVocab.filter(v => v.category === filterCat);
            
            // Sort by category then index
            filtered.sort((a,b) => {
                const catA = a.category || '';
                const catB = b.category || '';
                if(catA !== catB) return catA.localeCompare(catB);
                return (a.index || 0) - (b.index || 0);
            });

            document.getElementById('total-count').innerText = `總計: ${filtered.length} 筆`;

            tbody.innerHTML = filtered.map(v => {
                let emotionColor = 'text-gray-500 bg-gray-100';
                if (v.emotion === '褒義') emotionColor = 'text-rose-600 bg-rose-50 border border-rose-200';
                if (v.emotion === '貶義') emotionColor = 'text-green-700 bg-green-50 border border-green-200';
                if (v.emotion === '中性') emotionColor = 'text-blue-600 bg-blue-50 border border-blue-200';

                return `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-3 text-gray-500"><div class="bg-gray-100 px-2 py-1 rounded text-xs truncate max-w-[150px]" title="${v.category}">${v.category}</div> <div class="mt-1 text-xs font-mono">#${v.index}</div></td>
                    <td class="p-3">
                        <div class="font-black text-gray-800 text-lg">${v.word}</div>
                        <div class="text-[10px] px-1.5 py-0.5 rounded shadow-sm inline-block mt-1 ${emotionColor}">${v.emotion || '無'}</div>
                    </td>
                    <td class="p-3 text-gray-600">
                        <div class="text-xs text-indigo-500 font-mono font-bold mb-1">${v.pinyin || ''}</div>
                        <div class="truncate max-w-[200px]" title="${v.meaning}">${v.meaning}</div>
                    </td>
                    <td class="p-3 text-right">
                        <button onclick="deleteWord('${v.id}')" class="bg-red-50 text-red-500 hover:bg-red-100 px-3 py-1.5 rounded-lg font-bold text-xs transition-colors border border-red-100">刪除</button>
                    </td>
                </tr>
            `}).join('');
        };

        window.addSingleWord = async () => {
            const category = document.getElementById('f-category').value;
            const word = document.getElementById('f-word').value.trim();
            const pinyin = document.getElementById('f-pinyin').value.trim();
            const emotion = document.getElementById('f-emotion').value;
            const meaning = document.getElementById('f-meaning').value.trim();
            const sentence = document.getElementById('f-sentence').value.trim();

            if(!word || !meaning || !pinyin) return alert("成語、注音、成語釋義為必填！");

            const categoryWords = allVocab.filter(v => v.category === category);
            const maxIndex = categoryWords.length > 0 ? Math.max(...categoryWords.map(v => v.index || 0)) : 0;
            
            const docId = crypto.randomUUID();
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId), {
                    id: docId,
                    category, word, pinyin, emotion, meaning, sentence,
                    index: maxIndex + 1,
                    createdAt: new Date().toISOString()
                });
                
                document.getElementById('f-word').value = '';
                document.getElementById('f-pinyin').value = '';
                document.getElementById('f-meaning').value = '';
                document.getElementById('f-sentence').value = '';
                alert(`已成功新增成語：${word} (${category} #${maxIndex + 1})`);
            } catch(e) {
                console.error(e);
                alert("新增失敗！");
            }
        };

        window.bulkImport = async () => {
            const category = document.getElementById('b-category').value;
            const text = document.getElementById('b-json').value.trim();
            if(!text) return alert("請輸入 JSON 資料");
            
            try {
                const data = JSON.parse(text);
                if(!Array.isArray(data)) return alert("請提供 JSON 陣列格式！\n範例：[{\"word\":\"四季如春\"...}]");
                
                const categoryWords = allVocab.filter(v => v.category === category);
                let currentIndex = categoryWords.length > 0 ? Math.max(...categoryWords.map(v => v.index || 0)) : 0;
                
                let count = 0;
                for(let item of data) {
                    const docId = crypto.randomUUID();
                    currentIndex++;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId), {
                        id: docId,
                        category: category,
                        word: item.word || item.成語 || '',
                        pinyin: item.pinyin || item.注音 || '',
                        emotion: item.emotion || item.情感色彩 || '中性',
                        meaning: item.meaning || item.釋義 || '',
                        sentence: item.sentence || item.例句 || '',
                        index: currentIndex,
                        createdAt: new Date().toISOString()
                    });
                    count++;
                }
                alert(`成功批次匯入 ${count} 筆成語至分類：${category}！`);
                document.getElementById('b-json').value = '';
            } catch(e) {
                console.error(e);
                alert("JSON 解析失敗，請確認格式是否正確。");
            }
        };

        window.bulkDelete = async () => {
            const category = document.getElementById('delete-category').value;
            
            const confirmMsg = category === 'ALL'
                ? "⚠️ 嚴重警告！您即將刪除「所有分類」的成語！此操作無法復原，確定要繼續嗎？"
                : `⚠️ 警告！您即將刪除分類「${category}」的所有成語！此操作無法復原，確定要繼續嗎？`;

            if(!confirm(confirmMsg)) return;
            if(category === 'ALL' && !confirm("請再次確認：這將會清空整個題庫庫！確定嗎？")) return;

            const toDelete = category === 'ALL' ? allVocab : allVocab.filter(v => v.category === category);

            if(toDelete.length === 0) return alert("該條件下目前沒有任何資料可以刪除！");

            try {
                updateStatus("執行刪除中...", true, "bg-orange-500");
                let count = 0;
                
                for(let v of toDelete) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', v.id));
                    count++;
                }
                
                alert(`成功批次刪除 ${count} 筆資料！`);
                updateStatus("連線成功，即時同步中", true);
            } catch(e) {
                console.error(e);
                alert("批次刪除過程中發生錯誤，部分資料可能未刪除成功！");
                updateStatus("連線成功，即時同步中", true);
            }
        };

        window.deleteWord = async (docId) => {
            if(!confirm("確定要刪除這筆資料嗎？")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Vocab', docId));
            } catch(e) {
                console.error(e);
                alert("刪除失敗！");
            }
        };

        const initSystem = async () => {
            const config = getStoredConfig();
            if (!config || !config.apiKey) {
                alert("請先返回主系統填寫 API Key 設定！");
                return;
            }

            const fullConfig = { ...BASE_FIREBASE_CONFIG, apiKey: config.apiKey };
            try {
                const appInstance = initializeApp(fullConfig);
                auth = getAuth(appInstance);
                db = getFirestore(appInstance);

                initCategorySelects(); // 載入分類選單

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus("連線成功，即時同步中", true);
                        const vocabCol = collection(db, 'artifacts', appId, 'public', 'data', 'Vocab');
                        onSnapshot(vocabCol, (snap) => {
                            let temp = [];
                            snap.forEach(d => temp.push(d.data()));
                            allVocab = temp;
                            
                            // 更新分類選項與渲染表格
                            updateCategoryOptions();
                            window.renderTable();
                        }, (err) => {
                            console.error(err);
                            updateStatus("監聽失敗", false);
                        });
                    } else {
                        updateStatus("未連線 (驗證失敗)", false);
                    }
                });

            } catch (error) {
                console.error(error);
                updateStatus("初始化失敗", false);
            }
        };

        initSystem();
    </script>
</body>
</html>
